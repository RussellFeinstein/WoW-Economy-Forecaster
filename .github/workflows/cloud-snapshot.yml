# Hourly commodities capture that does not depend on the desktop (M0.5, issues #41/#42).
# Design record and one-time activation checklist: docs/cloud-capture.md
#
# The schedule fires only from the default branch. Secrets are added by hand in
# repository settings and never appear in the repo; see the checklist for the list.

name: Cloud snapshot capture

on:
  schedule:
    # :16 past each hour, matching the local Task Scheduler tradition. Actions
    # cron is best effort: expect minutes of jitter and occasional skipped runs.
    # The in-run gap guard turns silent skips into loud failures (exit 3).
    - cron: "16 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-snapshot
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        # --no-deps keeps the job lean and fast: the fetcher's import chain is
        # stdlib plus httpx and boto3 (see docs/cloud-capture.md).
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps .
          pip install httpx boto3

      - name: Fetch and upload commodities snapshot
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          SNAPSHOT_S3_ENDPOINT: ${{ secrets.SNAPSHOT_S3_ENDPOINT }}
          SNAPSHOT_S3_BUCKET: ${{ secrets.SNAPSHOT_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SNAPSHOT_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SNAPSHOT_S3_SECRET_ACCESS_KEY }}
        run: python -m wow_forecaster.ingestion.cloud_fetch
