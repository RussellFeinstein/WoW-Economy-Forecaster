name: CI

on:
  # pull_request is the pre-merge gate for every branch under the PR-only
  # flow (issue #46); push on main is the post-merge backstop. Branch-push
  # triggers would double-run CI against the PR run.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Without fail-fast disabled, one matrix leg's failure cancels the
      # other and masks its test results (issue #44 acceptance needs both).
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,viz]"

      - name: Lint with ruff
        run: ruff check wow_forecaster/ tests/

      - name: Run tests
        run: pytest --tb=short -q
