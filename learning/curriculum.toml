  "Reconstruct the milestone dependency graph from memory",
  "Explain why CI/CD is a slice of a late phase rather than an early one",
  "Explain why paper trading precedes the warehouse",
  "Name three ceiling items and say what each would replace",
  "Say what is deliberately excluded from the ceiling and why",
]
