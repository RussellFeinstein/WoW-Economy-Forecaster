[[question]]
id = "m06-q14"
kind = "mcq"
prompt = """
Someone proposes fixing the leak by shrinking the horizon set to [1, 3] so it
matches the backtest config. What is wrong with that?
"""
answer = """
It solves the wrong problem. The leak is caused by the split rule, not by the
horizon values, and dropping the 7d and 28d models removes the product's most
useful outputs to make a measurement problem disappear.

The 28d forecast is what the crafting windows and the longer-horizon
recommendations are built on. Deleting it to make validation clean is choosing to
measure less rather than measure honestly. The right direction is the opposite:
align backtest.horizons_days up to [1, 7, 28] so the comparison becomes possible,
and fix the split so the holdout means something.
"""
options = [
  { text = "The leak comes from the split rule, not the horizon values; shrinking horizons deletes useful output to hide a measurement problem", correct = true },
  { text = "Nothing is wrong; matching the two config values is the documented fix", note = "The two lists do need to match, but by raising the backtest horizons to [1, 7, 28], not by lowering the production ones. The mismatch is a symptom; the direction of the fix matters." },
  { text = "It would work, but only after the realization ledger lands", note = "The ledger is unrelated to this. It scores forecasts against actuals after they mature; it does not make a leaked training split clean." },
  { text = "It would break the crafting advisor's imports", note = "The advisor reads forecasts by horizon from the database and degrades to fallbacks when one is absent, so it would keep running. The cost is a worse product, not an ImportError." },
]
source = "config/default.toml"
anchor = "target_horizons_days = [1, 7, 28]"

[[question]]
id = "m06-q15"
kind = "recall"
prompt = """
Why is the walk-forward harness the right place to evaluate this model, rather
than a bigger or better single holdout?
"""
rubric = [
  "A single holdout gives one estimate from one regime, so it cannot show degradation over time",
  "Purging and embargo cost roughly 2h days off the end of the training data, which is severe on a short history",
  "Walk-forward reuses the whole date range as many folds, so the evaluation set is far larger than one holdout",
  "And it produces per-fold errors, which is what a paired significance test needs",
]
answer = """
Three reasons, and the third is the one that matters most later.

First, a single holdout is one estimate from one market regime. It cannot answer
whether the model degrades as an expansion matures, which is the actual production
question here.

Second, purging plus embargo removes about 2h days from the end of training. At
h = 28 on a 90-day history, a single holdout leaves very little to train on.
Walk-forward amortizes that cost across many folds instead of paying it once at
the end.

Third, walk-forward produces a per-fold error series per model. That is exactly
the input a paired test needs: Diebold-Mariano and Wilcoxon signed-rank both
operate on paired error differences across folds. A single holdout gives one
number per model, and you cannot test a difference between two numbers.
"""
source = "wow_forecaster/backtest/splits.py"
anchor = "Rolling origin better tests: \"can the model generalize across regimes?\""
see_also = ["docs/ROADMAP.md"]

[[question]]
id = "m06-q16"
kind = "find"
prompt = """
The backtest harness was built so an ML model could be dropped into it later.
Find the sentence that says so, name the two methods a model must implement, and
say what "later never arrived" means concretely.
"""
rubric = [
  "The protocol is intentionally minimal so ML models can implement the same interface later",
  "fit(rows) and predict(horizon_days)",
  "BacktestStage calls all_baseline_models() and nothing else, so only the four baselines ever run",
  "A grep for LightGBMForecaster across backtest/ returns nothing",
]
answer = """
backtest/models.py states it in the interface-contract section: the protocol is
intentionally minimal so ML models can implement the same interface later. The
contract is two methods, fit(rows) and predict(horizon_days), both already
implemented by LightGBMForecaster in spirit.

Concretely, later never arrived: BacktestStage calls all_baseline_models() and
nothing else, so every backtest run has compared four naive baselines against each
other. LightGBMForecaster appears nowhere under backtest/.

The lesson worth keeping: a baseline the candidate model is never run against is
not a baseline, it is a fixture. Building the harness and running the comparison
are separate pieces of work, and only one of them got done.
"""
source = "wow_forecaster/backtest/models.py"
anchor = "This protocol is intentionally minimal so ML models can implement the same"
see_also = ["LESSONS.md"]

[[question]]
id = "m06-q17"
kind = "mcq"
prompt = """
Which of these is a feature-leakage problem rather than a label-leakage problem?
"""
answer = """
Computing a 7-day rolling mean with a window that includes the target date is
feature leakage: an input contains information from after the prediction point.

The distinction is worth holding precisely, because this repo handles the two
asymmetrically. Feature leakage is handled carefully: features/lag_rolling.py
documents its boundary, and the inference column set is deliberately smaller than
the training set. Label leakage in the training split is not handled at all. Two
different failure modes, two different fixes, and knowing which one you are
looking at determines whether you reach for the feature builder or the splitter.
"""
options = [
  { text = "A 7-day rolling mean whose window includes the target date", correct = true },
  { text = "Training rows whose target date falls inside the validation window", note = "That is label leakage: the input features are fine, the labels overlap. This is the trainer.py defect." },
  { text = "Early stopping choosing its round against a contaminated validation set", note = "A downstream consequence of label leakage, not a feature problem. The features going into early stopping are legitimate; the labels it scores against are not." },
  { text = "backtest.horizons_days disagreeing with features.target_horizons_days", note = "A config-to-code mismatch that makes comparison impossible. Not leakage of either kind, though it hid the consequences of both." },
]
source = "wow_forecaster/features/lag_rolling.py"
anchor = "Lag and rolling features only access obs_date ≤ current date."

