# M06: Splitting time series without lying to yourself.
#
# Citation rule: `source` is a path, `anchor` is a verbatim single-line snippet
# from that path. Never a line number. tests/test_learning/test_bank_integrity.py
# fails if an anchor stops matching, so editing the cited code forces the
