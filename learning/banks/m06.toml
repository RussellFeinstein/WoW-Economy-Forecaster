works.
"""
options = [
  { text = "For each horizon h, assert max(obs_date + h) over training rows < validation start", correct = true },
  { text = "Assert max(obs_date) over training rows < min(obs_date) over validation rows", note = "This passes today. It tests the feature-date split, which is already correct, so it would give a green light to the exact bug being fixed." },
  { text = "Assert the training and validation row counts sum to the input row count", note = "This passes today and must stop passing after the fix: purging deliberately drops rows, so they no longer sum. A useful invariant to update, but it detects nothing." },
  { text = "Assert validation_mae is above some floor after retraining", note = "Directionally true, since the honest number will be worse, but a threshold on a metric is not a leakage test. It would drift, need retuning, and never say what is wrong." },
]
source = "wow_forecaster/ml/trainer.py"
anchor = "val_days = config.model.validation_split_days"
lab = "lab-01-purge-embargo"

