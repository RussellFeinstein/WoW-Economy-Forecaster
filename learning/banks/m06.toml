# ── The correct component: backtest/splits.py ─────────────────────────────────

[[question]]
id = "m06-q01"
kind = "recall"
prompt = """
Walk-forward validation in this repo makes exactly one structural promise about
every fold it generates. What is the promise, and why is stating it in terms of
dates rather than rows the whole point?
"""
rubric = [
  "test_date > train_end, for every fold, with no exceptions",
  "It is a statement about the date being predicted, not about row counts or ordering",
  "So no information from the test window can reach the model during training",
  "It is a design-level guarantee, not a runtime assertion: nothing checks it at execution time",
]
answer = """
Every fold satisfies test_date > train_end. The docstring says so directly, and
calls it a design-level guarantee rather than a runtime check, which is honest:
the generator is constructed so the property holds, and nothing asserts it later.

The reason to phrase it as a date relation is that a forecasting row is two
different points in time at once. It has a feature date (when the inputs were
observed) and a label date (the future price being predicted). A split defined
over rows, or over feature dates alone, does not pin down where the labels fall.
A split defined over the predicted date does. Hold onto that distinction; M06
exists because the other half of this repo does not make it.
"""
source = "wow_forecaster/backtest/splits.py"
anchor = "The structural guarantee is: test_date > train_end for every fold."
see_also = ["LESSONS.md"]

[[question]]
id = "m06-q02"
kind = "mcq"
prompt = """
The fold generator uses a fixed rolling training window rather than an expanding
one that grows from a fixed start. Why, for this data specifically?
"""
answer = """
Rolling origin with a fixed window tests generalization across market regimes,
which is the real production question for a system whose whole premise is
transferring across expansions.

An expanding window is easier to justify statistically (more data per fold, lower
variance in the estimate) but it means the earliest data influences every fold,
and a large historical sample smooths regime shifts away. WoW markets move
through regimes on a schedule: the race-to-world-first spike, the mid-season lull,
a content-patch burst, the season-end crash. A model that only looks good because
three years of history diluted the regime change has not been tested on the thing
that will actually break it.
"""
options = [
  { text = "A fixed window tests whether the model generalizes across market regimes, which an expanding window smooths away", correct = true },
  { text = "A fixed window is faster to train, which matters because folds multiply by series and horizon", note = "True but not the reason. The docstring argues from regimes, not from cost, and a correctness argument outranks a performance one." },
  { text = "An expanding window would leak future data into early folds", note = "It would not. An expanding window still satisfies test_date > train_end; it just uses more history per fold. Leakage is a separate axis from window shape." },
  { text = "The 30-day retention wall makes an expanding window impossible", note = "The wall limits raw observations, not the daily rollups the backtest reads. Rollups are the durable history and are not capped at 30 days." },
]
source = "wow_forecaster/backtest/splits.py"
anchor = "Rolling origin better tests: \"can the model generalize across regimes?\""

[[question]]
id = "m06-q03"
kind = "predict"
prompt = """
Data runs 2025-01-01 to 2025-03-31. Config sets window_days = 30, step_days = 7,
and you generate folds for horizon_days = 3.

What is the train_end of fold 0, and what stops the loop at the end?
"""
answer = """
Fold 0 has train_end = 2025-01-30.

The first cutoff is start_date + (window_days - 1), which is 2025-01-01 plus 29
days. The off-by-one to watch: window_days counts days inclusively, so a 30-day
window starting 2025-01-01 ends on 2025-01-30, not 2025-01-31.

The loop breaks when test_date > end_date, where test_date = cutoff +
horizon_days. So it stops as soon as the date being predicted would fall outside
the data, not when the training window would. That is why a longer horizon
produces fewer folds from the same date range: each fold needs its label to exist.
"""
options = [
  { text = "train_end = 2025-01-30; the loop stops when test_date would exceed end_date", correct = true },
  { text = "train_end = 2025-01-31; the loop stops when test_date would exceed end_date", note = "Off by one. window_days is inclusive: 2025-01-01 plus (30 - 1) days is 2025-01-30. Getting this wrong shifts every fold by a day." },
  { text = "train_end = 2025-01-30; the loop stops when train_end would exceed end_date", note = "The break condition is on test_date, not train_end. Stopping on train_end would generate folds whose labels do not exist in the data." },
  { text = "train_end = 2025-01-04; the window is counted backwards from the first cutoff", note = "The window is counted forward from start_date to find the first cutoff. train_start is then derived backwards from that cutoff, which is where 2025-01-01 comes back." },
]
source = "wow_forecaster/backtest/splits.py"
anchor = "cutoff = start_date + timedelta(days=window_days - 1)"

[[question]]
id = "m06-q04"
kind = "find"
prompt = """
The fold generator validates its arguments and raises ValueError on three of
them, but one invalid-looking input returns an empty list instead of raising.
Which input, and why is returning empty the right call there?
"""
rubric = [
  "end_date <= start_date returns an empty list rather than raising",
  "window_days, step_days, and horizon_days below 1 all raise ValueError",
  "A too-short date range is a data condition, not a programming error",
  "So a caller sweeping a range that happens to be empty gets zero folds, not a crash",
]
answer = """
end_date <= start_date returns []. The three integer parameters raise ValueError
when below 1.

The distinction is between a caller mistake and a data condition. window_days = 0
is nonsense no matter what data exists, so it is a bug in the call and should be
loud. A date range that is empty or inverted is something a caller can legitimately
arrive at by sweeping dates over a database that turned out to have one day of
history, and the honest answer is "no folds", not an exception. The same file
also returns [] when the range is long enough to validate but too short to fit a
single fold, which is the same reasoning applied one step further.
"""
source = "wow_forecaster/backtest/splits.py"
anchor = "if end_date <= start_date:"

# ── The incorrect component: ml/trainer.py ───────────────────────────────────

[[question]]
id = "m06-q05"
kind = "recall"
prompt = """
trainer.py holds out the last 14 calendar days as validation, splitting rows by
obs_date. The docstring says random splits would create look-ahead bias, and that
is correct.

The 1d model is fine. Why is the 28d model's validation MAE meaningless?
"""
rubric = [
  "Each training row at date T carries the label price(T + h)",
  "With h = 28, training labels run to split_date + 28",
  "That covers the entire 14-day validation window and 14 days beyond it",
  "So every validation label is a price the model already saw as a training label",
]
answer = """
Because the split is on the feature date, and the label reaches past it.

A training row at obs_date = T carries the target price(T + h). The split keeps
every row with obs_date <= split_date in training. For h = 28 that means training
labels extend to split_date + 28. The validation window is only 14 days wide, so
it is entirely inside the range the training labels already covered, with two
weeks to spare. Every single validation label is a price the model was fit on.

The 7d model leaks half the window: labels reach split_date + 7 against a 14-day
window. The 1d model leaks one day out of 14, which is small but not zero.

The split prevents exactly the failure its docstring names, and misses the one it
does not. That is what makes it worth studying rather than just fixing: the
reasoning was sound and the conclusion was still wrong.
"""
source = "wow_forecaster/ml/trainer.py"
anchor = "val_split_date = date_strs[-(val_days + 1)]"
see_also = ["LESSONS.md", "PLAN.md"]
lab = "lab-01-purge-embargo"

[[question]]
id = "m06-q06"
kind = "recall"
prompt = """
Name the general rule this repo violated, in one sentence, in a form that would
have prevented it. Then say which component got it right and what its rule
looks like.
"""
rubric = [
  "For a forecasting target, the split boundary belongs on the label date, not the feature date",
  "backtest/splits.py got it right, independently",
  "Its guarantee test_date > train_end is a statement about labels",
  "Two components in one repo disagreed about what a split means, and only one was audited",
]
answer = """
The rule: for a forecasting target, the split boundary belongs on the label date,
not the feature date.

backtest/splits.py already encodes exactly that. Its guarantee, test_date >
train_end, is a statement about the date being predicted. It arrived at the right
rule independently and never shared it, because the two components were written
for different purposes and only one of them was ever audited for leakage.

The generalizable lesson is not "remember to purge". It is that when two parts of
a system both implement a concept as fundamental as a train/test split, the fact
that they disagree is itself the finding, and it is visible without running
anything.
"""
source = "wow_forecaster/backtest/splits.py"
anchor = "The structural guarantee is: test_date > train_end for every fold."
see_also = ["LESSONS.md"]

