kind = "recall"
prompt = """
There is a config-level tell that the model-versus-baseline comparison could
never have been run, visible without reading any code. What is it?
"""
rubric = [
  "backtest.horizons_days is [1, 3]",
  "features.target_horizons_days is [1, 7, 28]",
  "They share only horizon 1, so 7d and 28d have no baseline to compare against at all",
  "A comparison across mismatched horizons is not a comparison, and the mismatch sat in config in plain sight",
]
answer = """
The two horizon lists in config/default.toml do not match. Backtests run at
[1, 3]; production forecasts at [1, 7, 28]. The only shared value is 1.

So even if the backtest harness had included the ML model, two of the three
production horizons had no baseline to be compared against, and the third was
compared on a different partition with different aggregation. The stated
acceptance bar in backtest/models.py, that a model must beat all four baselines,
was unmeasurable the whole time, and the evidence was two lines of config.

The transferable habit: when a docstring states an acceptance bar, check that
something actually evaluates it. Otherwise the stated standard and the enforced
standard drift apart silently, and the drift is invisible in every green test run.
"""
