[[question]]
id = "m06-q08"
kind = "recall"
prompt = """
The leaked validation set does more damage than one wrong number in a metadata
table. What is the second-order effect, and which mechanism causes it?
"""
rubric = [
  "The same validation set drives LightGBM early stopping",
  "Early stopping picks the boosting round that minimizes validation error",
  "That error is measured on labels the model already trained on, so it keeps improving",
  "So the stopping round is chosen against a contaminated signal: the model is mis-sized, not just mis-scored",
]
answer = """
The validation set is passed to LightGBM as a watchlist, and early stopping halts
training when validation error stops improving. But that error is computed on
labels the model already fit, so it keeps going down past the point where genuine
generalization error would have turned around. The chosen stopping round is
therefore too high: the model is overfit by construction, not merely
optimistically scored.

This is why the fix cannot be "report a different number". A mis-scored model is
still the right model with the wrong label on it. A mis-sized model is a different
model. Retraining after the split is fixed will produce different boosters, and
the honest reading is that no current accuracy claim survives.
"""
source = "wow_forecaster/ml/lgbm_model.py"
anchor = "stopping_rounds=self._early_stopping_rounds,"
see_also = ["PLAN.md"]
lab = "lab-01-purge-embargo"

[[question]]
id = "m06-q09"
kind = "find"
prompt = """
trainer.py has a second split path that does not use dates at all. Find it, say
when it triggers, and say what it does about label leakage.
"""
rubric = [
  "The 80/20 row-count fallback, used when the data has fewer dates than validation_split_days",
  "It slices the encoded row list by index, not by date",
  "It does nothing about label leakage, and additionally does not guarantee temporal ordering of the split",
  "It logs a warning, so it is at least visible when it happens",
]
answer = """
The fallback splits the encoded rows 80/20 by list index when the training window
holds fewer distinct dates than validation_split_days. It logs a warning, which is
the one thing it does right.

It is worse than the date path on two counts. It inherits the label leakage
unchanged, and it also drops the temporal guarantee entirely: the split follows
row order in the Parquet, which is whatever the dataset builder emitted, so a
"validation" row can predate a "training" row. The docstring's own warning about
random splits applies to this branch, from inside the same function.

Worth noting where this actually bites. It is the cold-start path, which is
exactly the regime the whole transfer-learning premise operates in.
"""
source = "wow_forecaster/ml/trainer.py"
anchor = "# Fallback: 80/20 row-count split when window is very short"

# ── The fix: purging and embargo ─────────────────────────────────────────────

[[question]]
id = "m06-q10"
kind = "recall"
prompt = """
Define purging and embargo as they apply to this training split. What does each
one remove, and why is purging alone not enough?
"""
rubric = [
  "Purging drops training rows whose target date falls at or after the validation start",
  "That removes the direct overlap: no training label is a validation label",
  "Embargo additionally drops training rows within h days before the purge boundary",
  "Because adjacent rows share overlapping rolling-feature windows, so information bleeds across the boundary even when labels do not",
]
answer = """
Purging: drop every training row whose target date (obs_date + h) falls at or
after the validation start. That kills the direct overlap. After purging, no
training label is also a validation label.

Embargo: additionally drop training rows in a buffer of h days immediately before
the purge boundary. Purging handles the labels; embargo handles the features. Rows
adjacent to the boundary carry rolling windows and lags computed over spans that
reach into the validation period, so two rows straddling the cut are correlated
even when neither one's label crosses. Without the buffer, the model can learn the
local regime of the validation window from features rather than labels.

Cost: for h = 28, purging plus embargo removes roughly 56 days from the end of the
training set. That is real, and on a 90-day history it is most of it. Which is the
argument for the walk-forward backtest doing the heavy lifting on evaluation
rather than a single holdout.
"""
source = "wow_forecaster/ml/trainer.py"
anchor = "# ── Time-based validation split ───────────────────────────────────────────"
lab = "lab-01-purge-embargo"

